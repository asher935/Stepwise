name: Release Desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS Intel
            runner: macos-15-intel
            platform: darwin
            arch: x64
          - label: macOS Apple Silicon
            runner: macos-14
            platform: darwin
            arch: arm64
          - label: Windows x64
            runner: windows-latest
            platform: win32
            arch: x64
          - label: Windows ARM64
            runner: windows-11-arm
            platform: win32
            arch: arm64
          - label: Linux x64
            runner: ubuntu-24.04
            platform: linux
            arch: x64
          - label: Linux ARM64
            runner: ubuntu-24.04-arm
            platform: linux
            arch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Linux packaging dependencies
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y fakeroot dpkg

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        if: matrix.platform != 'linux'
        run: bunx playwright install chromium

      - name: Install Playwright Chromium with Linux deps
        if: matrix.platform == 'linux'
        run: bunx playwright install --with-deps chromium

      - name: Build release artifacts
        shell: bash
        env:
          STEPWISE_RELEASE_PLATFORM: ${{ matrix.platform }}
          STEPWISE_RELEASE_ARCH: ${{ matrix.arch }}
        run: |
          bun run build:desktop
          cd packages/desktop
          bunx electron-forge make --arch="$STEPWISE_RELEASE_ARCH"
          node scripts/collect-release-assets.mjs

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}-${{ matrix.arch }}
          path: packages/desktop/release-assets/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-24.04
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release view "$TAG_NAME" >/dev/null 2>&1 || gh release create "$TAG_NAME" --generate-notes
          find release-assets -type f -print0 | xargs -0 gh release upload "$TAG_NAME" --clobber
